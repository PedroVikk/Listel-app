<svg width="100%" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fdf4ff"/>
    <stop offset="100%" stop-color="#f8faff"/>
  </linearGradient>
  <linearGradient id="sneaker_sole" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f1f5f9"/>
    <stop offset="100%" stop-color="#e2e8f0"/>
  </linearGradient>
  <linearGradient id="sneaker_upper" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fce7f3"/>
    <stop offset="100%" stop-color="#E91E8C" stop-opacity="0.6"/>
  </linearGradient>
</defs>

<!-- Screen background -->
<rect x="200" y="20" width="280" height="400" rx="28" fill="url(#bg3)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<rect x="200" y="20" width="280" height="400" rx="28" fill="none" stroke="#e0d4f0" stroke-width="1.5" style="fill:none;stroke:rgb(224, 212, 240);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

