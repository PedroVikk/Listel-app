<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Adicionar item</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#ff586b",
                        "error-container": "#f74b6d",
                        "surface": "#f9f6f5",
                        "tertiary-fixed-dim": "#a595ff",
                        "on-tertiary-container": "#2f009c",
                        "on-secondary-fixed": "#66122a",
                        "secondary-dim": "#8b2f44",
                        "surface-variant": "#dfdcdc",
                        "on-primary-fixed-variant": "#600016",
                        "on-background": "#2f2f2e",
                        "secondary-fixed": "#ffc2ca",
                        "inverse-surface": "#0e0e0e",
                        "on-tertiary-fixed": "#170059",
                        "outline": "#787676",
                        "on-secondary": "#ffeff0",
                        "tertiary-container": "#b3a5ff",
                        "surface-bright": "#f9f6f5",
                        "on-secondary-fixed-variant": "#8c3045",
                        "error-dim": "#a70138",
                        "on-primary-container": "#4e0010",
                        "surface-container-low": "#f3f0ef",
                        "on-tertiary-fixed-variant": "#3800b4",
                        "on-tertiary": "#f6f0ff",
                        "primary-dim": "#a2002d",
                        "secondary-container": "#ffc2ca",
                        "inverse-primary": "#ff5167",
                        "outline-variant": "#afadac",
                        "error": "#b41340",
                        "inverse-on-surface": "#9e9c9c",
                        "on-error-container": "#510017",
                        "tertiary-dim": "#4e0bec",
                        "tertiary-fixed": "#b3a5ff",
                        "primary-fixed": "#ff7480",
                        "surface-container-highest": "#dfdcdc",
                        "on-primary-fixed": "#000000",
                        "secondary": "#9a3b4f",
                        "surface-container-high": "#e4e2e1",
                        "primary-container": "#ff7480",
                        "on-surface": "#2f2f2e",
                        "secondary-fixed-dim": "#ffaeba",
                        "primary": "#b90034",
                        "on-surface-variant": "#5c5b5b",
                        "on-error": "#ffefef",
                        "surface-dim": "#d6d4d3",
                        "surface-tint": "#b90034",
                        "tertiary": "#5a2af7",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffefef",
                        "surface-container": "#eae7e7",
                        "on-secondary-container": "#80273c",
                        "background": "#f9f6f5"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #dfdcdc; /* surface-variant */
            border-radius: 9999px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col relative pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl flex items-center px-4 h-16 w-full shadow-[0_4px_30px_rgba(0,0,0,0.02)]">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-zinc-500 hover:bg-zinc-100 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="flex-1 text-center font-headline font-semibold text-lg text-on-surface mr-10">
            Adicionar item
        </h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-20 px-6 max-w-2xl mx-auto w-full">
<!-- Photo Upload Section -->
<section class="mb-8 flex flex-col items-center">
<button class="w-32 h-32 rounded-xl bg-surface-container-low flex flex-col items-center justify-center text-primary hover:bg-surface-container transition-colors shadow-sm active:scale-95">
<span class="material-symbols-outlined text-4xl mb-2" data-icon="add_a_photo" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
<span class="font-label text-sm font-medium">Adicionar foto</span>
</button>
</section>
<!-- Form Section -->
<form class="space-y-6">
<!-- Nome do Item -->
<div class="relative group">
<label class="block font-label text-sm font-medium text-on-surface-variant mb-1 ml-4" for="item-name">Nome do item <span class="text-primary">*</span></label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 rounded-lg px-5 py-4 font-body text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all" id="item-name" placeholder="Ex: Câmera Retro" type="text"/>
</div>
<div class="absolute right-4 top-[38px] text-xs text-outline-variant font-label">0/150</div>
</div>
<!-- Preço -->
<div class="relative group">
<label class="block font-label text-sm font-medium text-on-surface-variant mb-1 ml-4" for="item-price">Preço (R$)</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 rounded-lg px-5 py-4 font-body text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all" id="item-price" placeholder="0,00" type="text"/>
</div>
<div class="absolute right-4 top-[38px] text-xs text-outline-variant font-label">0/12</div>
</div>
<!-- Link -->
<div class="relative group">
<label class="block font-label text-sm font-medium text-on-surface-variant mb-1 ml-4" for="item-link">Link</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 rounded-lg px-5 py-4 font-body text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all" id="item-link" placeholder="https://" type="url"/>
</div>
<div class="absolute right-4 top-[38px] text-xs text-outline-variant font-label">0/500</div>
</div>
<!-- Observações -->
<div class="relative group">
<label class="block font-label text-sm font-medium text-on-surface-variant mb-1 ml-4" for="item-notes">Observações</label>
<div class="relative">
<textarea class="w-full bg-surface-container-low border-0 rounded-lg px-5 py-4 font-body text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all resize-none" id="item-notes" placeholder="Detalhes de cor, tamanho..." rows="4"></textarea>
</div>
<div class="absolute right-4 bottom-3 text-xs text-outline-variant font-label">0/500</div>
</div>
</form>
</main>
<!-- Fixed Action Button Area -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-background via-background/90 to-transparent z-40 flex justify-center">
<button class="w-full max-w-md bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg py-4 rounded-full shadow-[0_12px_32px_rgba(185,0,52,0.2)] hover:shadow-[0_16px_40px_rgba(185,0,52,0.3)] active:scale-95 transition-all duration-300">
            Salvar item
        </button>
</div>
</body></html>
