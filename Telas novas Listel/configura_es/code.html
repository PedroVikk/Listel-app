<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "on-secondary-fixed-variant": "#8c3045",
                "on-tertiary": "#f6f0ff",
                "inverse-surface": "#0e0e0e",
                "on-tertiary-container": "#2f009c",
                "tertiary": "#5a2af7",
                "secondary-dim": "#8b2f44",
                "on-primary-container": "#4e0010",
                "primary-container": "#ff7480",
                "on-surface-variant": "#5c5b5b",
                "tertiary-container": "#b3a5ff",
                "tertiary-fixed": "#b3a5ff",
                "surface-dim": "#d6d4d3",
                "surface-container": "#eae7e7",
                "tertiary-dim": "#4e0bec",
                "surface-container-highest": "#dfdcdc",
                "outline": "#787676",
                "secondary-fixed-dim": "#ffaeba",
                "primary-dim": "#a2002d",
                "inverse-primary": "#ff5167",
                "error": "#b41340",
                "surface-container-low": "#f3f0ef",
                "on-error-container": "#510017",
                "on-tertiary-fixed": "#170059",
                "on-background": "#2f2f2e",
                "on-primary": "#ffefef",
                "on-primary-fixed-variant": "#600016",
                "secondary-fixed": "#ffc2ca",
                "tertiary-fixed-dim": "#a595ff",
                "on-tertiary-fixed-variant": "#3800b4",
                "primary-fixed-dim": "#ff586b",
                "surface-variant": "#dfdcdc",
                "surface-bright": "#f9f6f5",
                "on-primary-fixed": "#000000",
                "inverse-on-surface": "#9e9c9c",
                "primary": "#b90034",
                "surface-container-high": "#e4e2e1",
                "secondary": "#9a3b4f",
                "on-secondary-container": "#80273c",
                "surface-tint": "#b90034",
                "on-surface": "#2f2f2e",
                "on-error": "#ffefef",
                "surface": "#f9f6f5",
                "on-secondary-fixed": "#66122a",
                "surface-container-lowest": "#ffffff",
                "background": "#f9f6f5",
                "error-dim": "#a70138",
                "error-container": "#f74b6d",
                "outline-variant": "#afadac",
                "primary-fixed": "#ff7480",
                "secondary-container": "#ffc2ca",
                "on-secondary": "#ffeff0"
        },
        "borderRadius": {
                "DEFAULT": "1rem",
                "lg": "2rem",
                "xl": "3rem",
                "full": "9999px"
        },
        "spacing": {},
        "fontFamily": {
                "headline": [
                        "Plus Jakarta Sans"
                ],
                "body": [
                        "Inter"
                ],
                "label": [
                        "Inter"
                ]
        }
},
    },
  }
</script>
<style>
  body {
    background-color: theme('colors.surface');
    color: theme('colors.on-surface');
    font-family: theme('fontFamily.body');
    -webkit-font-smoothing: antialiased;
  }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface-bright/70 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full no-border tonal-shift">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-zinc-500" data-icon="arrow_back">arrow_back</span>
<h1 class="font-headline font-bold text-lg tracking-tight text-on-surface">Configurações</h1>
</div>
</header>
<main class="pt-24 px-4 max-w-2xl mx-auto space-y-8">
<!-- Appearance Section -->
<section class="space-y-4">
<h2 class="font-headline font-semibold text-xl text-on-surface ml-2 tracking-tight">Aparência</h2>
<div class="bg-surface-container-lowest rounded-lg p-5 flex flex-col gap-6 shadow-[0_4px_24px_rgba(185,0,52,0.03)]">
<!-- Color Preview & Change -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-gradient-to-br from-primary to-primary-container shadow-[0_8px_16px_rgba(185,0,52,0.15)]"></div>
<div>
<p class="font-body font-medium text-on-surface">Cor Principal</p>
<p class="font-body text-sm text-on-surface-variant">Vermelho Morango</p>
</div>
</div>
<button class="bg-surface-container-high text-primary font-body font-medium px-4 py-2 rounded-full hover:bg-surface-container-highest transition-colors">
            Trocar
          </button>
</div>
<!-- Theme Mode Segmented Button -->
<div class="bg-surface-container-low p-1 rounded-full flex items-center justify-between">
<button class="flex-1 py-2.5 rounded-full bg-surface-container-lowest text-primary font-body font-medium shadow-sm transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="light_mode">light_mode</span>
            Light
          </button>
<button class="flex-1 py-2.5 rounded-full text-on-surface-variant hover:text-on-surface font-body font-medium transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="hdr_auto">hdr_auto</span>
            Auto
          </button>
<button class="flex-1 py-2.5 rounded-full text-on-surface-variant hover:text-on-surface font-body font-medium transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="dark_mode">dark_mode</span>
            Dark
          </button>
</div>
</div>
</section>
<!-- App Icon Section -->
<section class="space-y-4">
<h2 class="font-headline font-semibold text-xl text-on-surface ml-2 tracking-tight">Ícone do app</h2>
<div class="flex gap-4 overflow-x-auto pb-4 px-2 -mx-2 snap-x">
<!-- Default -->
<div class="snap-start shrink-0 flex flex-col items-center gap-3">
<div class="w-20 h-20 rounded-[1.5rem] bg-gradient-to-br from-primary to-primary-container shadow-[0_8px_20px_rgba(185,0,52,0.12)] flex items-center justify-center text-white border-4 border-surface-container-lowest ring-2 ring-primary/20">
<span class="material-symbols-outlined text-[32px]" data-icon="favorite">favorite</span>
</div>
<span class="font-body text-sm font-medium text-on-surface">Default</span>
</div>
<!-- Pink -->
<div class="snap-start shrink-0 flex flex-col items-center gap-3 opacity-60 hover:opacity-100 transition-opacity cursor-pointer">
<div class="w-20 h-20 rounded-[1.5rem] bg-gradient-to-br from-primary-container to-secondary-container flex items-center justify-center text-primary border-4 border-transparent">
<span class="material-symbols-outlined text-[32px]" data-icon="favorite">favorite</span>
</div>
<span class="font-body text-sm font-medium text-on-surface-variant">Pink</span>
</div>
<!-- Dark -->
<div class="snap-start shrink-0 flex flex-col items-center gap-3 opacity-60 hover:opacity-100 transition-opacity cursor-pointer">
<div class="w-20 h-20 rounded-[1.5rem] bg-zinc-900 flex items-center justify-center text-zinc-300 border-4 border-transparent">
<span class="material-symbols-outlined text-[32px]" data-icon="favorite">favorite</span>
</div>
<span class="font-body text-sm font-medium text-on-surface-variant">Dark</span>
</div>
</div>
</section>
<!-- Credits Card -->
<div class="mt-12 bg-gradient-to-br from-surface-container-lowest to-surface-container-low rounded-lg p-6 flex flex-col items-center justify-center text-center gap-2 shadow-[0_4px_24px_rgba(0,0,0,0.02)]">
<span class="material-symbols-outlined text-primary-container text-[32px] mb-2" data-icon="favorite" data-weight="fill" style="font-variation-settings: 'FILL' 1;">favorite</span>
<p class="font-body text-sm text-on-surface-variant">
        Feito por <span class="font-semibold text-primary">Pedro Victor</span>
</p>
<p class="font-body text-sm text-on-surface-variant">
        Pensado por <span class="font-semibold text-primary">Ines Gomides</span>
</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 w-full z-50 rounded-t-[2rem] bg-surface-bright/80 backdrop-blur-xl no-border tonal-shift shadow-[0_-8px_32px_rgba(245,24,30,0.08)] flex justify-around items-center h-20 px-4 pb-2">
<button class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-5 py-2 hover:text-red-500 transition-all">
<span class="material-symbols-outlined text-[24px]" data-icon="format_list_bulleted">format_list_bulleted</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide mt-1">Lists</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-5 py-2 hover:text-red-500 transition-all">
<span class="material-symbols-outlined text-[24px]" data-icon="explore">explore</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide mt-1">Discover</span>
</button>
<button class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 px-5 py-2 hover:text-red-500 transition-all">
<span class="material-symbols-outlined text-[24px]" data-icon="favorite">favorite</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide mt-1">Saved</span>
</button>
<button class="flex flex-col items-center justify-center bg-zinc-100 text-red-600 rounded-full px-5 py-2 hover:text-red-500 transition-all">
<span class="material-symbols-outlined text-[24px]" data-icon="person" data-weight="fill" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Inter'] text-[11px] font-semibold tracking-wide mt-1">Profile</span>
</button>
</nav>
</body></html>
